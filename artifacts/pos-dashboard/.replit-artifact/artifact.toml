kind = "web"
previewPath = "/"
title = "MirrorTech POS"
version = "1.0.0"
id = "artifacts/pos-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18295

[services.development]
run = "pnpm --filter @workspace/pos-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pos-dashboard", "run", "build" ]
publicDir = "artifacts/pos-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18295"
BASE_PATH = "/"
