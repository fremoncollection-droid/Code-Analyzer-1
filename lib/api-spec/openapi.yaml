          type: string
        qrCode:
          type: ["string", "null"]

    SyncInput:
      type: object
      required: [transactions]
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionInput"

    SyncResult:
      type: object
      required: [synced, failed]
      properties:
        synced:
          type: integer
        failed:
          type: integer
        errors:
          type: array
          items:
            type: string

    ShiftInput:
      type: object
