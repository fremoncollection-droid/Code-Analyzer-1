      properties:
        endTime:
          type: string
        status:
          type: string
        openingCash:
          type: string
        closingCash:
          type: string
        notes:
          type: string

    Shift:
      type: object
      required: [id, userId, locationId, startTime, status]
      properties:
        id:
          type: string
        userId:
          type: string
        userName:
          type: ["string", "null"]
        locationId:
          type: string
        locationName:
          type: ["string", "null"]
        startTime:
          type: string
        endTime:
          type: ["string", "null"]
        status:
          type: string
        openingFloat:
          type: ["string", "null"]
        closingFloat:
          type: ["string", "null"]
        expectedCash:
          type: ["string", "null"]
        expectedMoMo:
          type: ["string", "null"]
        expectedCard:
          type: ["string", "null"]
        actualCash:
          type: ["string", "null"]
        actualMoMo:
          type: ["string", "null"]
        actualCard:
          type: ["string", "null"]
        varianceCash:
          type: ["string", "null"]
        varianceMoMo:
          type: ["string", "null"]
        varianceCard:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
