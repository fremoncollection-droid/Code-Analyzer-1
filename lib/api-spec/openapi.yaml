components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    RefreshInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [token, refreshToken, user]
      properties:
        token:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    UserProfile:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          type: string
        locationId:
          type: ["string", "null"]
        station:
          type: ["string", "null"]

    Location:
      type: object
      required: [id, name, isActive]
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    LocationInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        address:
          type: string
        phone:
          type: string

    Category:
      type: object
      required: [id, name, color]
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
          default: "#3B82F6"
        description:
          type: ["string", "null"]
        createdAt:
          type: string

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        color:
          type: string
        description:
          type: string

    InventoryItem:
      type: object
      required: [id, name, price, quantity]
      properties:
        id:
          type: string
        name:
          type: string
        sku:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        price:
          type: string
        cost:
          type: ["string", "null"]
        wholesalePrice1:
          type: ["string", "null"]
        wholesalePrice2:
          type: ["string", "null"]
        quantity:
          type: integer
        minQuantity:
          type: integer
        locationId:
          type: ["string", "null"]
        categoryId:
          type: ["string", "null"]
        categoryName:
          type: ["string", "null"]
        unit:
          type: ["string", "null"]
        unitId:
          type: ["string", "null"]
        unitName:
          type: ["string", "null"]
        unitAbbreviation:
          type: ["string", "null"]
        shelfId:
          type: ["string", "null"]
        shelfName:
          type: ["string", "null"]
        shelfZone:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    InventoryInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
        sku:
          type: string
        description:
          type: string
        price:
          type: string
        wholesalePrice1:
          type: string
        wholesalePrice2:
          type: string
        cost:
          type: string
        quantity:
          type: integer
        minQuantity:
          type: integer
        locationId:
          type: string
        categoryId:
          type: string
        unitId:
          type: string
        shelfId:
          type: string
        unit:
          type: string

    InventoryUpdate:
      type: object
      properties:
        name:
          type: string
        sku:
          type: string
        description:
          type: string
        price:
          type: string
        wholesalePrice1:
          type: string
        wholesalePrice2:
          type: string
        cost:
          type: string
        quantity:
          type: integer
        minQuantity:
          type: integer
        locationId:
          type: string
        categoryId:
          type: string
        unit:
          type: string
        isActive:
          type: boolean

    CartItem:
      type: object
      required: [itemId, name, quantity, price]
      properties:
        itemId:
          type: string
        name:
          type: string
        quantity:
          type: integer
        price:
          type: string
        total:
          type: string

    TransactionInput:
      type: object
      required: [locationId, items, subtotal, taxAmount, total, paymentMethod]
      properties:
        locationId:
          type: string
        shiftId:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: string
        taxAmount:
          type: string
        taxBreakdown:
          type: object
        total:
          type: string
        paymentMethod:
          type: string
          enum: [cash, momo, card, net30, purchase_order]
        momoPhone:
          type: string
        momoNetwork:
          type: string
        momoReference:
          type: string
        salesMode:
          type: string
          enum: [retail, wholesale]
        wholesaleTier:
          type: [integer, "null"]
        customerId:
          type: [string, "null"]
        customerName:
          type: string
        customerPhone:
          type: string
        notes:
          type: string

    Transaction:
      type: object
      required: [id, receiptNumber, locationId, items, subtotal, taxAmount, total, paymentMethod, paymentStatus, createdAt]
      properties:
        id:
          type: string
        receiptNumber:
          type: string
        locationId:
          type: string
        locationName:
          type: ["string", "null"]
        cashierId:
          type: ["string", "null"]
        cashierName:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: string
        taxAmount:
          type: string
        total:
          type: string
        paymentMethod:
          type: string
        paymentStatus:
          type: string
        momoPhone:
          type: ["string", "null"]
        momoNetwork:
          type: ["string", "null"]
        momoReference:
          type: ["string", "null"]
        customerName:
          type: ["string", "null"]
        customerPhone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        isVoided:
          type: boolean
        voidReason:
          type: ["string", "null"]
        salesMode:
          type: ["string", "null"]
        wholesaleTier:
          type: ["integer", "null"]
        customerId:
          type: ["string", "null"]
        createdAt:
          type: string

    TransactionList:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer

    VoidInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    Receipt:
      type: object
      required: [transaction, location]
      properties:
        transaction:
          $ref: "#/components/schemas/Transaction"
        location:
          $ref: "#/components/schemas/Location"
