services:
  - type: web
    name: mirrortech-pos
    runtime: node
    plan: free
    # Updated line below to force-install vite before building
    buildCommand: cd render-app && npm install --production=false && npm run build
    startCommand: cd render-app && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mirrortech-pos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: mirrortech-pos-db
    plan: free
